<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Kakebo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Kakebo Finance</h1>
            <ul class="flex space-x-6">
                <li><a href="/" class="hover:text-blue-200">Home</a></li>
                <li><a href="/expenses" class="hover:text-blue-200">Expenses</a></li>
                <li><a href="/incomes" class="hover:text-blue-200">Income</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <!-- Success Message -->
        <div id="successMessage" class="hidden mb-4 p-4 bg-green-50 border border-green-600 text-green-700 rounded-lg">
            <p id="successText"></p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden mb-4 p-4 bg-red-50 border border-red-600 text-red-700 rounded-lg">
            <p id="errorText"></p>
        </div>

        <h2 class="text-3xl font-bold mb-6">Expenses</h2>

        <!-- Add Expense Form -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h3 class="text-xl font-bold mb-4">Add New Expense</h3>
            <form id="expenseForm" class="space-y-4">
                <div>
                    <label for="description" class="block font-semibold mb-2">Description <span class="text-red-600">*</span></label>
                    <input type="text" id="description" name="description" minlength="3" maxlength="100" required
                           class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600 transition"
                           placeholder="e.g., Groceries">
                    <p id="descriptionError" class="text-red-600 text-sm mt-1 hidden"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="amount" class="block font-semibold mb-2">Amount <span class="text-red-600">*</span></label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required
                               class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600 transition"
                               placeholder="0.00">
                        <p id="amountError" class="text-red-600 text-sm mt-1 hidden"></p>
                    </div>

                    <div>
                        <label for="category" class="block font-semibold mb-2">Category <span class="text-red-600">*</span></label>
                        <select id="category" name="category" required
                                class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600 transition">
                            <option value="">Select category</option>
                            <option value="SURVIVAL">Survival (Essentials)</option>
                            <option value="ENTERTAINMENT">Entertainment (Treats)</option>
                            <option value="CULTURE">Culture (Education)</option>
                            <option value="EXTRAS">Extras (Unexpected)</option>
                        </select>
                        <p id="categoryError" class="text-red-600 text-sm mt-1 hidden"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex items-center space-x-2">
                        <input type="checkbox" id="isFixed" name="isFixed" class="rounded cursor-pointer">
                        <label for="isFixed" class="font-semibold cursor-pointer">Fixed Expense</label>
                    </div>

                    <div class="flex items-center space-x-2">
                        <input type="checkbox" id="isRecurring" name="isRecurring" class="rounded cursor-pointer">
                        <label for="isRecurring" class="font-semibold cursor-pointer">Recurring</label>
                    </div>
                </div>

                <div>
                    <label for="date" class="block font-semibold mb-2">Date <span class="text-red-600">*</span></label>
                    <input type="date" id="date" name="date" required
                           class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600 transition">
                    <p id="dateError" class="text-red-600 text-sm mt-1 hidden"></p>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-semibold transition disabled:bg-gray-400 disabled:cursor-not-allowed">
                    Add Expense
                </button>
            </form>
        </div>

        <!-- Expenses List -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h3 class="text-xl font-bold mb-4">Recent Expenses <span id="expenseCount" class="text-gray-500 text-sm font-normal"></span></h3>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-8 text-gray-500">
                <p>No expense records found. Add your first expense to get started!</p>
            </div>

            <!-- Dynamic Expense List -->
            <div id="expenseList" class="space-y-3"></div>
        </div>

        <div class="mt-6">
            <a href="/" class="bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700 font-semibold">
                Back to Home
            </a>
        </div>
    </div>

    <!-- Load Expense Management Module -->
    <script th:src="@{/js/expenses.js}"></script>
</body>
</html>
